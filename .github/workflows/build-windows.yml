name: Compile Windows Distribution

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.5.0

      - name: Run Verification Tests
        env:
          AOS_SIGNING_SALT: "test_prod_salt"
        run: |
          python -m unittest discover -s tests/ -v

      - name: Compile PyInstaller Standalone Executable
        env:
          AOS_SIGNING_SALT: "test_prod_salt"
        run: |
          pyinstaller AcademyOS.spec

      - name: Install Tesseract OCR via Chocolatey
        run: |
          choco install tesseract -y

      - name: Bundle Portable OCR Dependencies
        shell: powershell
        run: |
          # Create destination directory
          New-Item -ItemType Directory -Force -Path "tesseract"
          # Verify installation success and copy files
          $commonPaths = @(
              "C:\Program Files\Tesseract-OCR",
              "C:\Program Files (x86)\Tesseract-OCR"
          )
          $found = $false
          foreach ($path in $commonPaths) {
              if (Test-Path "$path\tesseract.exe") {
                  Write-Host "Tesseract found at $path. Bundling files..."
                  Copy-Item -Path "$path\*" -Destination "tesseract" -Recurse -Force
                  $found = $true
                  break
              }
          }
          if (-not $found) {
              Write-Error "Tesseract installation not found."
              exit 1
          }
          Get-ChildItem -Path "tesseract"

      - name: Compile Inno Setup Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build_installer.iss

      - name: Generate Checksums
        shell: powershell
        run: |
          $exeHash = (Get-FileHash dist\AcademyOS.exe -Algorithm SHA256).Hash
          $setupHash = (Get-FileHash dist\AcademyOS_Setup_v1.0.2.exe -Algorithm SHA256).Hash
          Write-Host "AcademyOS.exe SHA-256: $exeHash"
          Write-Host "AcademyOS_Setup_v1.0.2.exe SHA-256: $setupHash"
          echo "SHA256 Checksums`nAcademyOS.exe: $exeHash`nAcademyOS_Setup_v1.0.2.exe: $setupHash" > dist\checksums.txt

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            dist/AcademyOS.exe
            dist/AcademyOS_Setup_v1.0.2.exe
            dist/checksums.txt
          body: |
            ### AcademyOS Desktop v1.0.2 Commercial Release (Windows)
            
            This release contains the production-ready standalone executable and the automated offline installer for Windows 10 & 11.
            
            **Release Assets**:
            - `AcademyOS.exe` (Standalone Executable)
            - `AcademyOS_Setup_v1.0.2.exe` (Setup Installer with bundled portable OCR)
            
            **Installation Notes**:
            1. Download and run `AcademyOS_Setup_v1.0.2.exe`.
            2. Follow the steps on the wizard (OCR will be provisioned automatically).
            3. Paste your cryptographic license activation key.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
