name: Compile Windows Distribution

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r server/requirements.txt
          pip install pyinstaller==6.5.0 pytest httpx

      - name: Run Verification Tests
        env:
          AOS_SIGNING_SALT: "test_prod_salt"
        run: |
          python -m unittest discover -s tests/ -v

      - name: Compile PyInstaller Standalone Executable
        env:
          AOS_SIGNING_SALT: "test_prod_salt"
        run: |
          pyinstaller AcademyOS.spec

      - name: Verify Executable Boot (Dry Run)
        env:
          AOS_SIGNING_SALT: "test_prod_salt"
          QT_QPA_PLATFORM: "offscreen"
        shell: powershell
        run: |
          Write-Host "Starting dry run of AcademyOS.exe to verify successful startup..."
          $proc = Start-Process -FilePath "dist\AcademyOS.exe" -NoNewWindow -RedirectStandardError "err.txt" -RedirectStandardOutput "out.txt" -PassThru
          Start-Sleep -Seconds 8
          $proc.Refresh()
          
          Write-Host "=== Process State After Sleep ==="
          Write-Host "HasExited: $($proc.HasExited)"
          if ($proc.HasExited) {
              Write-Host "ExitCode: $($proc.ExitCode)"
          }
          
          if (Test-Path "err.txt") {
              Write-Host "=== Standard Error Output ==="
              Get-Content "err.txt"
          } else {
              Write-Host "err.txt not found"
          }
          
          if (Test-Path "out.txt") {
              Write-Host "=== Standard Output ==="
              Get-Content "out.txt"
          } else {
              Write-Host "out.txt not found"
          }
          
          if ($proc.HasExited) {
              Write-Error "AcademyOS.exe crashed on startup."
              exit 1
          } else {
              Write-Host "AcademyOS.exe launched successfully and is running."
              Stop-Process -Id $proc.Id -Force
              Write-Host "Process terminated successfully."
          }

      - name: Install Tesseract OCR via Chocolatey
        run: |
          choco install tesseract -y

      - name: Bundle Portable OCR Dependencies
        shell: powershell
        run: |
          # Create destination directory
          New-Item -ItemType Directory -Force -Path "tesseract"
          # Verify installation success and copy files
          $commonPaths = @(
              "C:\Program Files\Tesseract-OCR",
              "C:\Program Files (x86)\Tesseract-OCR"
          )
          $found = $false
          foreach ($path in $commonPaths) {
              if (Test-Path "$path\tesseract.exe") {
                  Write-Host "Tesseract found at $path. Bundling files..."
                  Copy-Item -Path "$path\*" -Destination "tesseract" -Recurse -Force
                  $found = $true
                  break
              }
          }
          if (-not $found) {
              Write-Error "Tesseract installation not found."
              exit 1
          }
          Get-ChildItem -Path "tesseract"

      - name: Compile Inno Setup Installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          if ($version -eq "master" -or $version -eq "") { $version = "1.0.3" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version build_installer.iss

      - name: Generate Checksums
        shell: powershell
        run: |
          $exeHash = (Get-FileHash dist\AcademyOS.exe -Algorithm SHA256).Hash
          $setupFile = Get-Item dist\AcademyOS_Setup_*.exe
          $setupHash = (Get-FileHash $setupFile -Algorithm SHA256).Hash
          Write-Host "AcademyOS.exe SHA-256: $exeHash"
          Write-Host "$($setupFile.Name) SHA-256: $setupHash"
          echo "SHA256 Checksums`nAcademyOS.exe: $exeHash`n$($setupFile.Name): $setupHash" > dist\checksums.txt

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            dist/AcademyOS.exe
            dist/AcademyOS_Setup_*.exe
            dist/checksums.txt
          body: |
            ### AcademyOS Desktop ${{ github.ref_name }} Commercial Release (Windows)
            
            This release contains the production-ready standalone executable and the automated offline installer for Windows 10 & 11.
            
            **Release Assets**:
            - `AcademyOS.exe` (Standalone Executable)
            - `AcademyOS_Setup_*.exe` (Setup Installer with bundled portable OCR)
            
            **Installation Notes**:
            1. Download and run the setup installer (`AcademyOS_Setup_*.exe`).
            2. Follow the steps on the wizard (OCR will be provisioned automatically).
            3. Paste your cryptographic license activation key.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
